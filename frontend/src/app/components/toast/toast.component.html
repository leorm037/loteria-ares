<div #toastElement
  class="toast fade toast-width mt-2"
  [ngClass]="type"
  role="alert"
  aria-live="assertive"
  aria-atomic="true">
  @if (titulo === undefined) {
    <div class="d-flex">
      <div class="toast-body">
        {{ mensagem }}
      </div>
      <button
        type="button"
        class="btn-close me-2 m-auto"
        [ngClass]="(type === 'text-bg-light') ? '' : 'btn-close-white'"
        aria-label="Fechar"
        (click)="hide()"></button>
    </div>
  } @else {
    <div class="toast-header">
      <strong class="me-auto">{{ titulo }}</strong>
      <button type="button" class="btn-close" aria-label="Fechar" (click)="hide()"></button>
    </div>
    <div class="toast-body">{{ mensagem }}</div>
  }
</div>
