<form>
  <div class="row justify-content-center">
    <div class="col-xl-6 col-lg-8 col-md-10 col-12">
      <div class="card">
        <div class="card-header bg-gradient">
          <h5 class="mb-0"><i class="bi bi-person-plus"></i> Inscreva-se</h5>
        </div>
        <div class="card-body">
          <div class="row">
            <div class="col-12">
              <div class="mb-3">
                <label for="nome" class="form-label">Nome</label>
                <div class="input-group">
                  <span class="input-group-text" id="nome-icon"><i class="bi bi-person"></i></span>
                  <input type="text" maxlength="60" class="form-control" id="nome" placeholder="Nome completo" aria-label="Nome completo" aria-describedby="nome-icon" autofocus autocomplete="name">
                </div>
              </div>
            </div>
            <div class="col-12">
              <div class="mb-3">
                <label for="telefone_input" class="form-label">Telefone</label>
                <div class="input-group">
                  <span class="input-group-text" id="telefone_icon_input"><i class="bi bi-phone"></i></span>
                  <input type="text" maxlength="20" class="form-control" id="telefone_input" placeholder="(00) 99999/-9999" aria-label="Número do telefone de contato" aria-describedby="telefone_icon_input">
                </div>
              </div>
            </div>
            <div class="col-12">
              <div class="mb-3">
                <label for="email" class="form-label">E-mail</label>
                <div class="input-group">
                  <span class="input-group-text" id="email-icon"><i class="bi bi-envelope-at"></i></span>
                  <input type="email" maxlength="120" class="form-control" id="email" placeholder="email@dominio.com" aria-label="Endereço de e-mail para autenticação" aria-describedby="email-icon" autocomplete="email">
                </div>
              </div>
            </div>
            <div class="col-12">
              <div class="mb-3">
                <label for="senha_input" class="form-label">Senha</label>
                <div class="input-group">
                  <span class="input-group-text" id="password_icon_input"><i class="bi bi-shield-lock"></i></span>
                  <input type="password" minlength="6" maxlength="20" class="form-control" id="senha_input" aria-label="Senha de autenticação" aria-describedby="password_icon_input" autocomplete="new-password">
                </div>
              </div>
            </div>
          </div>
        </div>
        <div class="card-footer bg-gradient d-flex justify-content-between">
          <button class="btn btn-secondary bg-gradient btn-sm" type="reset"><i class="fa-solid fa-broom"></i> Limpar</button>
          <button type="submit" class="btn btn-primary bg-gradient btn-sm"><i class="bi bi-floppy"></i> Salvar</button>
        </div>
      </div>
    </div>
  </div>
</form>
