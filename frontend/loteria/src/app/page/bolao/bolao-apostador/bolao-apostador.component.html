<div class="card">
  <div class="card-header">
    <div class="d-flex justify-content-between align-items-center">
      <div>
        <h5 class="mb-0"><i class="bi bi-people"></i> Bolão apostador</h5>
      </div>
      <div>
        <a class="btn btn-sm btn-primary bg-gradient" routerLink="/bolao/apostador/novo"><i class="bi bi-plus"></i> Novo</a>
      </div>
    </div>
  </div>
  <app-bolao-cabecalho [bolaoId]="bolaoId"></app-bolao-cabecalho>
  <div class="card-body">
    <div class="table-responsive">
      <table class="table table-striped table-hover align-middle">
        <thead>
          <tr>
            <th scope="col">Nome</th>
            <th scope="col">E-mail</th>
            <th scope="col">Celular</th>
            <th scope="col">Pago</th>
            <th scope="col" class="text-end">Quantidade de cotas</th>
            <th scope="col" class="text-center">Ações</th>
          </tr>
        </thead>
        <tbody class="table-group-divider">
          @for (apostador of apostadores; track apostador.id) {
          <tr>
            <th scope="row">{{ apostador.nome }}</th>
            <td>{{ apostador.email }}</td>
            <td>{{ apostador.celular }}</td>
            <td>{{ apostador.pago ? 'Sim' : 'Não' }}</td>
            <td class="text-end">{{ apostador.cotas }}</td>
            <td class="text-center">
              <a routerLink="/bolao/apostador/alterar" class="btn btn-sm btn-secondary me-2"><i class="bi bi-pencil-square"></i> Alterar</a>
              <button type="button" class="btn btn-sm btn-danger"><i class="bi bi-trash"></i> Excluir</button>
            </td>
          </tr>
          } @empty {
          <tr>
            <td colspan="8" class="text-center">Nenhum registro encontrado</td>
          </tr>
          }
        </tbody>
      </table>
    </div>
  </div>
</div>
