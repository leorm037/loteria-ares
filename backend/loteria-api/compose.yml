services:
    mailhog:
        container_name: loteria-api-mail
        image: mailhog/mailhog:latest
        restart: always
        ports:
            - 8025:8025
            - 1025:1025

    mariadb:
        container_name: loteria-api-mariadb
        image: mariadb:latest
        restart: always
        working_dir: /app
        ports:
            - 3306:3306
        environment:
            - MYSQL_ROOT_PASSWORD=loteria
            - MYSQL_DATABASE=loteria
            - MYSQL_USER=loteria
            - MYSQL_PASSWORD=loteria
        volumes:
            - type: volume
              source: mariadb
              target: /var/lib/mysql
            - .:/app
    
    phpmyadmin:
        container_name: loteria-api-phpmyadmin
        image: phpmyadmin:latest
        restart: always
        environment:
            - MYSQL_ROOT_PASSWORD=loteria
            - MYSQL_USER=loteria
            - MYSQL_PASSWORD=loteria
            - PMA_HOST=db
            - PMA_PORT=3306
            - PMA_USER=loteria
            - PMA_PASSWORD=loteria
            - PMA_PMADB=loteria
#            - PMA_ARBITRARY=0
        ports:
            - 8080:80
        depends_on:
            - mariadb
        links:
            - mariadb:db
    
    nginx:
        image: nginx:latest
        container_name: loteria-api-nginx
#        hostname: loteria-api.local.paginaemconstrucao.com.br
        restart: always
        working_dir: /app
        volumes:
            - .:/app
            - ./docker/etc/nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf
        ports:
            - 80:80
        environment:
            - NGINX_HOST=loteria-api.local.paginaemconstrucao.com.br
            - NGINX_PORT=80
        links:
            - php-fpm
        depends_on:
            - php-fpm

    php-fpm:
        container_name: loteria-api-php-fpm
        build: 
            context: docker
            dockerfile: Dockerfile-php-fpm
        restart: always
        working_dir: /app
        volumes:
            - .:/app
        ports:
            - 9000:9000
        links:
            - mariadb
            - mailhog
        depends_on:
            - mariadb
            - mailhog

volumes:
    mariadb:
        name: loteria-api-mariadb