services:
    mailhog:
        container_name: loteria-api-mail
        image: mailhog/mailhog:latest
        restart: always
        ports:
            - 8025:8025
            - 1025:1025

    mariadb:
        container_name: loteria-api-mariadb
        image: mariadb:latest
        restart: always
        working_dir: /app
        ports:
            - 3306:3306
        environment:
            - MYSQL_ROOT_PASSWORD=loteria
            - MYSQL_DATABASE=loteria
            - MYSQL_USER=loteria
            - MYSQL_PASSWORD=loteria
        volumes:
            - type: volume
              source: mariadb
              target: /var/lib/mysql
            - .:/app
    
    phpmyadmin:
        container_name: loteria-api-phpmyadmin
        image: phpmyadmin:latest
        restart: always
        environment:
            - MYSQL_ROOT_PASSWORD=loteria
            - MYSQL_USER=loteria
            - MYSQL_PASSWORD=loteria
            - PMA_HOST=db
            - PMA_PORT=3306
            - PMA_USER=loteria
            - PMA_PASSWORD=loteria
            - PMA_PMADB=loteria
#            - PMA_ARBITRARY=0
        ports:
            - 8080:80
        depends_on:
            - mariadb
        links:
            - mariadb:db
    
    ubuntu:
        container_name: loteria-api-ubuntu
        build:
            context: docker
            dockerfile: Dockerfile-ubuntu
#        hostname: loteria.local
        restart: always
        working_dir: /var/www/loteria-api
        volumes:
            - .:/var/www/loteria-api
            - ./docker/etc/apache2/apache2.conf:/etc/apache2/apache2.conf
            - ./docker/etc/apache2/sites-available/000-default.conf:/etc/apache2/sites-available/000-default.conf
        ports:
            - 80:80
#            - 443:443
#        environment:
#            - NGINX_HOST=loteria.local.paginaemconstrucao.net.br
#            - NGINX_PORT=80

